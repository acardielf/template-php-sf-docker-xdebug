parameters:
    app.sender_email: '%env(MAILER_SENDER_EMAIL)%'
    app.sender_name: '%env(MAILER_SENDER_NAME)%'

services:
    _defaults:
        autowire: true
        autoconfigure: true
        bind:
            # $asyncBus resolves to the default bus. Routing in messenger.yaml determines
            # whether a message runs sync or is queued. Change the routing entry there,
            # not here, when you want to introduce async processing.
            Symfony\Component\Messenger\MessageBusInterface $asyncBus: '@messenger.bus.default'

    # Register all classes in src/ as services
    App\:
        resource: '../src/'
        exclude:
            - '../src/Domain/Entity/'
            - '../src/Domain/Event/'
            - '../src/Domain/Exception/'
            - '../src/Domain/ValueObject/'
            - '../src/Infrastructure/Persistence/Entity/'
            - '../src/Infrastructure/Persistence/Migration/'
            - '../src/Application/Exception/'
            - '../src/Infrastructure/Exception/'
            - '../src/Infrastructure/Messenger/Message/'
            - '../src/Kernel.php'

    # Email handler — inject sender identity from parameters
    App\Infrastructure\Messenger\Handler\SendEmailMessageHandler:
        arguments:
            $senderEmail: '%app.sender_email%'
            $senderName: '%app.sender_name%'

    # Exception subscriber — inject debug flag from kernel
    App\Infrastructure\EventSubscriber\ExceptionSubscriber:
        arguments:
            $debug: '%kernel.debug%'
        tags:
            - { name: kernel.event_subscriber }

    # Domain repository bindings — wire interfaces to concrete implementations:
    # App\Domain\Repository\UserRepositoryInterface:
    #     class: App\Infrastructure\Repository\DoctrineUserRepository
