nelmio_api_doc:
    documentation:
        info:
            title: 'Application API'
            description: 'API documentation'
            version: '1.0.0'
        components:
            securitySchemes:
                Bearer:
                    type: http
                    scheme: bearer
                    bearerFormat: JWT
        security:
            - Bearer: []
    areas:
        path_patterns:
            - ^/api(?!/doc$)
        host_patterns: []
