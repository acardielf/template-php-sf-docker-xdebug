name: CI

#on:
#  push:
#    branches: [main, develop, 'feature/**', 'hotfix/**', 'release/**']
#  pull_request:
#    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: pdo, pdo_pgsql, intl, mbstring, redis
          coverage: none
          tools: composer:v2

      - name: Get composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Check code style (PHP CS Fixer)
        run: composer cs:check

      - name: Run static analysis (PHPStan)
        run: composer phpstan

      - name: Check refactoring (Rector)
        run: composer rector:check

  tests:
    name: Tests (PostgreSQL)
    runs-on: ubuntu-latest
    needs: quality

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: app
          POSTGRES_USER: app
          POSTGRES_PASSWORD: secret
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 3
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: pdo, pdo_pgsql, intl, mbstring, redis
          coverage: xdebug

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Create test database
        run: |
          PGPASSWORD=secret psql -h localhost -U app -d app -c "CREATE DATABASE app_test OWNER app;" || true
        env:
          PGPASSWORD: secret

      - name: Run database migrations (test)
        run: php bin/console doctrine:migrations:migrate --no-interaction --allow-no-migration
        env:
          APP_ENV: test
          DATABASE_TEST_URL: "postgresql://app:secret@localhost:5432/app_test?serverVersion=16&charset=utf8"

      - name: Create directories
        run: mkdir -p var/coverage

      - name: Run tests with coverage
        run: composer test:coverage
        env:
          APP_ENV: test
          DATABASE_TEST_URL: "postgresql://app:secret@localhost:5432/app_test?serverVersion=16&charset=utf8"
          MESSENGER_TRANSPORT_DSN: "redis://localhost:6379/messages"

      - name: Run Behat tests
        run: composer test:behat
        env:
          APP_ENV: test
          DATABASE_TEST_URL: "postgresql://app:secret@localhost:5432/app_test?serverVersion=16&charset=utf8"

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        with:
          file: var/coverage/clover.xml
          fail_ci_if_error: false

  sonarqube:
    name: SonarQube Analysis
    runs-on: ubuntu-latest
    needs: tests
    if: github.event_name == 'push'

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: app
          POSTGRES_USER: app
          POSTGRES_PASSWORD: secret
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: pdo, pdo_pgsql, intl, mbstring, redis
          coverage: xdebug

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Create test database
        run: |
          PGPASSWORD=secret psql -h localhost -U app -d app -c "CREATE DATABASE app_test OWNER app;" || true

      - name: Run tests with coverage
        run: composer test:coverage
        env:
          APP_ENV: test
          DATABASE_TEST_URL: "postgresql://app:secret@localhost:5432/app_test?serverVersion=16&charset=utf8"

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
